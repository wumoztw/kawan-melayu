<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kawan Melayu</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>
  <!-- Help Modal -->
  <div id="helpModal" class="modal-overlay" onclick="if(event.target === this) toggleHelpModal()">
    <div class="modal-content">
      <div class="modal-header">
        <h2>玩法說明</h2>
        <button class="close-btn" onclick="toggleHelpModal()">&times;</button>
      </div>

      <div class="info-grid">
        <div class="info-card green-card">
          <div class="card-title">✅ 目標</div>
          <div>用馬來語和 AI 對話，提升 Fluency，並維持 Confidence。</div>
        </div>

        <div class="info-card orange-card">
          <div class="card-title">⚠️ 注意</div>
          <div>輸入越自然、越能帶出情境，越容易升級與解鎖新詞彙。</div>
        </div>
      </div>
    </div>
  </div>

  <div id="mud-app-root">
    <div class="mud-container">
      <div class="mud-header">
        <div class="header-top">
          <div class="mud-title-main">Kawan Melayu</div>
          <button class="help-trigger" onclick="toggleHelpModal()">?</button>
        </div>

        <div class="mud-title-sub">v1.0</div>

        <div class="header-info">
          <div class="welcome-text">Selamat Datang!</div>
          <div class="welcome-sub">歡迎回來，準備好練馬來語了嗎？</div>
          <div class="intro-text">
            這是一個用 AI 互動練習馬來語的簡易遊戲。你可以選擇不同的 API Provider，並用自己的 Key 來玩。
          </div>
          <div class="api-links">
            <span class="text-highlight">取得 API Key：</span>
            <a href="https://openrouter.ai/keys" target="_blank">OpenRouter</a>
            <a href="https://console.groq.com/keys" target="_blank">Groq</a>
            <a href="https://aistudio.google.com/app/apikey" target="_blank">Gemini</a>
            <a href="https://platform.openai.com/api-keys" target="_blank">OpenAI</a>
          </div>
        </div>
      </div>

      <div class="mud-status-bar" id="mudStatusBar">
        <div class="mud-status-item">
          <span style="color: var(--color-red); font-weight: bold;">HP</span>
          <div class="mud-val-container">
            <div id="hpBar" class="mud-progress progress-hp" style="width: 100%"></div>
          </div>
          <span id="hpVal" class="mud-val">100</span>
        </div>

        <div class="mud-status-item">
          <span style="color: var(--color-blue); font-weight: bold;">EN</span>
          <div class="mud-val-container">
            <div id="enBar" class="mud-progress progress-en" style="width: 0%"></div>
          </div>
          <span id="enVal" class="mud-val">0</span>
        </div>

        <div class="mud-status-item">
          <span class="level-tag" id="levelVal">Lv. 1</span>
        </div>

        <div class="mud-status-item">
          <span class="location-tag" id="locVal">Mamak Stall</span>
        </div>
      </div>

      <!-- Settings -->
      <div class="mud-settings">
        <div class="mud-row">
          <select id="apiProvider" onchange="handleProviderChange()">
            <option value="openrouter">OpenRouter</option>
            <option value="groq">Groq</option>
            <option value="gemini">Google Gemini</option>
            <option value="openai">OpenAI</option>
          </select>

          <input type="password" id="apiKey" placeholder="API Key" onchange="saveConfig()" />

          <select id="modelSelect" onchange="saveConfig()">
            <option value="auto">Auto</option>
          </select>

          <div class="mud-btn-group">
            <button class="mud-btn mud-btn-save" onclick="saveGame()">Save</button>
            <button class="mud-btn mud-btn-load" onclick="document.getElementById('fileInput').click()">Load</button>
            <input type="file" id="fileInput" style="display:none" onchange="loadGame(event)" />

            <button class="mud-btn mud-btn-stop" id="stopBtn" onclick="stopRequest()" disabled>Stop</button>
            <button class="mud-btn mud-btn-retry" id="retryBtn" onclick="retryLastMessage()" disabled>Retry</button>
            <button class="mud-btn mud-btn-clear" id="clearBtn" onclick="clearChat()">Clear</button>
          </div>

          <div class="mud-opt-row">
            <label class="mud-opt">
              <input type="checkbox" id="optFallback" onchange="saveConfig()" />
              自動備援（失敗時換供應商）
            </label>
            <label class="mud-opt">
              <input type="checkbox" id="optSaveKeyInFile" onchange="saveConfig()" />
              存檔包含 API Key
            </label>
          </div>
        </div>
      </div>

      <div class="mud-chat-box" id="mudChatBox">
        <div class="mud-loading" id="mudLoading" style="display:none">AI thinking...</div>
      </div>

      <div class="mud-side-panel">
        <div class="panel-header" style="display:flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--color-border); margin-bottom: 15px; padding-bottom: 5px;">
          <div class="panel-title" style="margin-bottom: 0; border-bottom:none; padding-bottom: 0;">Kosa Kata</div>
        </div>
        <div id="inventoryList" class="vocab-list"></div>
      </div>

      <div class="mud-input-area">
        <input type="text" id="userInput" placeholder="Nasi Lemak..." onkeypress="handleKeyPress(event)" />
        <button id="sendBtn" onclick="sendMessage()">Send</button>
        <button class="vocab-toggle" onclick="toggleSidebar()">≡</button>
      </div>
    </div>
  </div>

  <!-- Cache-busting to avoid stale JS on GitHub Pages -->
  <script src="game.js?v=20260227_234900"></script>
</body>
</html>
